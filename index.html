<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Finance Tracker</title>

    <link rel="stylesheet" href="styles/style.css">
</head>
<body>

    <a href="#main-content" class="skip-link">
        Skip to Content
    </a>

    <header>
        <h1>Student Finance Tracker</h1>

        <nav>
            <ul>
                <li><a href="#about">About</a></li>
                <li><a href="#dashboard">Dashboard</a></li>
                <li><a href="#records">Records</a></li>
                <li><a href="#settings">Settings</a></li>
            </ul>
        </nav>
    </header>

    <main id="main-content">

        <section id="about">
            <h2>About</h2>
            <p>A finance tracker for students.</p>
        </section>

        <section id="dashboard">
            <h2>Dashboard</h2>

            <div id="totalRecords">0 Records</div>
            <div id="totalAmount">$0.00</div>
            <div id="topCategory">No Category</div>
        </section>

        <section id="formSection">
            <h2>Add Transaction</h2>

            <form id="transactionForm">

                <label for="description">Description</label>
                <input type="text" id="description" required>

                <label for="amount">Amount</label>
                <input type="text" id="amount" required>

                <label for="category">Category</label>
                <input type="text" id="category" required>

                <label for="date">Date</label>
                <input type="date" id="date" required>

                <button type="submit">
                    Add Transaction
                </button>

            </form>
        </section>

        <section id="records">
            <h2>Transactions</h2>

            <table>
                <thead>
                    <tr>
                        <th>Description</th>
                        <th>Amount</th>
                        <th>Category</th>
                        <th>Date</th>
                    </tr>
                </thead>

                <tbody id="tableBody">
                </tbody>

            </table>
        </section>

        <section id="settings">
            <h2>Settings</h2>

            <button id="exportBtn">
                Export JSON
            </button>

            <input type="file" id="importFile">
        </section>

    </main>

    <footer>
        <p>Ahmed Osman</p>
    </footer>

    <script type="module" src="scripts/ui.js"></script>

</body>
</html>
